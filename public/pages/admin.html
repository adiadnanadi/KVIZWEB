<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KvizMajstor — Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .page { min-height: 100vh; }
    .pg { padding: 32px 0 60px; }
    .ph { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
    .ph h1 { font-family: var(--fd); font-size: 28px; font-weight: 700; }
    .ph p  { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 18px; }
    .qc { display: flex; flex-direction: column; gap: 12px; }
    .qc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .qc-title { font-family: var(--fd); font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .qc-desc  { font-size: 13px; color: var(--text2); line-height: 1.4; }
    .qc-meta  { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 3px 10px; font-size: 12px; color: var(--text2); }
    .qc-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--border); }
    .ov-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    @media(max-width:900px){ .ov-grid { grid-template-columns: 1fr; } }
    .mini-list { display: flex; flex-direction: column; gap: 0; }
    .mini-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .mini-item:last-child { border-bottom: none; }
    .mini-name { font-size: 14px; font-weight: 500; }
    .mini-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="wrap">
      <a class="nb-brand" href="/admin"><span class="nb-logo">📚</span><span class="nb-title">KvizMajstor</span></a>
      <div class="nb-right">
        <span class="badge badge-purple">👑 Admin</span>
        <span class="nb-user" id="nb-email"></span>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Odjava</button>
      </div>
    </div>
  </nav>

  <div class="page">
    <div class="wrap pg">
      <div class="ph">
        <div><h1>Admin Panel</h1><p>Upravljanje kvizovima i praćenje napretka učenika</p></div>
        <a href="/create-quiz" class="btn btn-primary">✨ Kreiraj novi kviz</a>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-v" id="s-quizzes" style="color:var(--accent)">-</div><div class="stat-l">Ukupno kvizova</div></div>
        <div class="stat-card"><div class="stat-v" id="s-active"  style="color:var(--green)">-</div><div class="stat-l">Aktivnih kvizova</div></div>
        <div class="stat-card"><div class="stat-v" id="s-students" style="color:var(--purple)">-</div><div class="stat-l">Učenika</div></div>
        <div class="stat-card"><div class="stat-v" id="s-results" style="color:var(--amber)">-</div><div class="stat-l">Rješenih kvizova</div></div>
        <div class="stat-card"><div class="stat-v" id="s-avg"    style="color:var(--accent2)">-</div><div class="stat-l">Prosječan rezultat</div></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="overview">📊 Pregled</button>
        <button class="tab" data-tab="quizzes">📝 Kvizovi</button>
        <button class="tab" data-tab="results">📈 Rezultati</button>
        <button class="tab" data-tab="students">👥 Učenici</button>
      </div>

      <!-- Overview -->
      <div id="tab-overview" class="fade-up">
        <div class="ov-grid">
          <div class="card">
            <div class="sec-title">Posljednji rezultati</div>
            <div id="ov-results-wrap"><p style="color:var(--text3);font-size:14px;padding:16px 0">Učitavanje...</p></div>
          </div>
          <div class="card">
            <div class="sec-title">Aktivni kvizovi</div>
            <div class="mini-list" id="ov-active-wrap"></div>
          </div>
        </div>
      </div>

      <!-- Quizzes -->
      <div id="tab-quizzes" style="display:none">
        <div class="quiz-grid" id="quizzes-grid"></div>
      </div>

      <!-- Results -->
      <div id="tab-results" style="display:none">
        <div class="card">
          <div class="sec-title">Svi rezultati</div>
          <div style="overflow-x:auto" id="results-wrap"></div>
        </div>
      </div>

      <!-- Students -->
      <div id="tab-students" style="display:none">
        <div class="card">
          <div class="sec-title" id="students-title">Učenici</div>
          <div style="overflow-x:auto" id="students-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '/js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { toast, gradeBadge, fmtDate, pctColor } from '/js/utils.js';

    let quizzes = [], results = [], users = [];

    // ── Auth guard ──
    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href = '/login'; return; }
      const snap = await getDoc(doc(db, 'users', u.uid));
      if (snap.data()?.role !== 'admin') { window.location.href = '/student'; return; }
      document.getElementById('nb-email').textContent = u.email;
      await loadAll();
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href = '/login');

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ['overview','quizzes','results','students'].forEach(t => {
          document.getElementById('tab-' + t).style.display = btn.dataset.tab === t ? 'block' : 'none';
        });
      };
    });

    // ── Load data ──
    async function loadAll() {
      try {
        const [qs, rs, us] = await Promise.all([
          getDocs(query(collection(db, 'quizzes'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'results'),  orderBy('completedAt', 'desc'))),
          getDocs(collection(db, 'users'))
        ]);
        quizzes = qs.docs.map(d => ({ id: d.id, ...d.data() }));
        results = rs.docs.map(d => ({ id: d.id, ...d.data() }));
        users   = us.docs.map(d => ({ id: d.id, ...d.data() }));
        renderStats(); renderOverview(); renderQuizzes(); renderResults(); renderStudents();
      } catch(e) { toast('Greška pri učitavanju: ' + e.message, 'error'); }
    }

    function renderStats() {
      const students = users.filter(u => u.role === 'student');
      const avg = results.length ? Math.round(results.reduce((s,r) => s + (r.percentage||0), 0) / results.length) : 0;
      document.getElementById('s-quizzes').textContent  = quizzes.length;
      document.getElementById('s-active').textContent   = quizzes.filter(q => q.status === 'active').length;
      document.getElementById('s-students').textContent = students.length;
      document.getElementById('s-results').textContent  = results.length;
      document.getElementById('s-avg').textContent      = avg + '%';
    }

    function renderOverview() {
      // Last results table
      const rWrap = document.getElementById('ov-results-wrap');
      if (!results.length) { rWrap.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:16px 0">Nema rezultata</p>'; }
      else {
        rWrap.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
          <thead><tr><th>Učenik</th><th>Kviz</th><th>Rezultat</th><th>Ocjena</th><th>Datum</th></tr></thead>
          <tbody>${results.slice(0,8).map(r => `<tr>
            <td>${r.studentName}</td>
            <td style="color:var(--text)">${r.quizTitle}</td>
            <td style="color:${pctColor(r.percentage)};font-weight:600">${r.percentage}%</td>
            <td>${gradeBadge(r.grade, r.gradeLabel)}</td>
            <td>${fmtDate(r.completedAt)}</td>
          </tr>`).join('')}</tbody>
        </table></div>`;
      }
      // Active quizzes
      const aWrap = document.getElementById('ov-active-wrap');
      const active = quizzes.filter(q => q.status === 'active');
      if (!active.length) aWrap.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:8px 0">Nema aktivnih kvizova</p>';
      else aWrap.innerHTML = active.map(q => `<div class="mini-item">
        <div><div class="mini-name">${q.title}</div><div class="mini-sub">${q.numQuestions} pitanja · ${q.difficulty}</div></div>
        <span class="badge badge-green">Aktivan</span>
      </div>`).join('');
    }

    function renderQuizzes() {
      const grid = document.getElementById('quizzes-grid');
      if (!quizzes.length) { grid.innerHTML = `<div class="card empty"><div class="empty-icon">📝</div><h3>Nema kvizova</h3><p>Kreirajte prvi kviz</p><a href="/create-quiz" class="btn btn-primary">✨ Kreiraj kviz</a></div>`; return; }
      grid.innerHTML = quizzes.map(q => `
        <div class="card qc">
          <div class="qc-top">
            <div><div class="qc-title">${q.title}</div><div class="qc-desc">${q.description || ''}</div></div>
            <span class="badge ${q.status === 'active' ? 'badge-green' : 'badge-amber'}">${q.status === 'active' ? '● Aktivan' : '○ Neaktivan'}</span>
          </div>
          <div class="qc-meta">
            <span class="chip">📚 ${q.subject || 'Bez predmeta'}</span>
            <span class="chip">❓ ${q.numQuestions} pitanja</span>
            <span class="chip">⚡ ${q.difficulty}</span>
            ${q.timeLimit ? `<span class="chip">⏱ ${q.timeLimit} min</span>` : ''}
          </div>
          <div class="qc-actions">
            <a href="/admin?preview=${q.id}" class="btn btn-ghost btn-sm" onclick="openPreview('${q.id}');return false">👁 Pregled</a>
            <button class="btn btn-sm ${q.status === 'active' ? 'btn-amber' : 'btn-success'}" onclick="toggleStatus('${q.id}', '${q.status}')">
              ${q.status === 'active' ? '⏸ Deaktiviraj' : '▶ Aktiviraj'}
            </button>
            <button class="btn btn-danger btn-sm" onclick="delQuiz('${q.id}')">🗑 Obriši</button>
          </div>
        </div>`).join('');
    }

    function renderResults() {
      const wrap = document.getElementById('results-wrap');
      if (!results.length) { wrap.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:20px 0">Nema rezultata</p>'; return; }
      wrap.innerHTML = `<table class="tbl">
        <thead><tr><th>Učenik</th><th>Kviz</th><th>Bodovi</th><th>%</th><th>Ocjena</th><th>Datum</th><th></th></tr></thead>
        <tbody>${results.map(r => `<tr>
          <td style="color:var(--text);font-weight:500">${r.studentName}</td>
          <td>${r.quizTitle}</td>
          <td>${r.earnedPoints}/${r.totalPoints}</td>
          <td style="color:${pctColor(r.percentage)};font-weight:600">${r.percentage}%</td>
          <td>${gradeBadge(r.grade, r.gradeLabel)}</td>
          <td>${fmtDate(r.completedAt)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="openResult('${r.id}')">Detalji</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function renderStudents() {
      const students = users.filter(u => u.role === 'student');
      document.getElementById('students-title').textContent = `Učenici (${students.length})`;
      const wrap = document.getElementById('students-wrap');
      if (!students.length) { wrap.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:20px 0">Nema registrovanih učenika</p>'; return; }
      wrap.innerHTML = `<table class="tbl">
        <thead><tr><th>Ime</th><th>Email</th><th>Kvizova</th><th>Prosj. ocjena</th><th>Registrovan</th></tr></thead>
        <tbody>${students.map(s => {
          const sr = results.filter(r => r.userId === s.id);
          const avg = sr.length ? (sr.reduce((sum,r) => sum + r.grade, 0) / sr.length).toFixed(1) : '-';
          return `<tr>
            <td style="color:var(--text);font-weight:500">${s.displayName}</td>
            <td>${s.email}</td>
            <td><span class="badge badge-blue">${sr.length}</span></td>
            <td style="color:var(--amber);font-weight:600">${avg}</td>
            <td>${fmtDate(s.createdAt)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    // ── Actions ──
    window.toggleStatus = async (id, current) => {
      const ns = current === 'active' ? 'inactive' : 'active';
      await updateDoc(doc(db, 'quizzes', id), { status: ns });
      toast(ns === 'active' ? 'Kviz aktiviran!' : 'Kviz deaktiviran', 'success');
      await loadAll();
    };

    window.delQuiz = async (id) => {
      if (!confirm('Sigurno želite obrisati ovaj kviz?')) return;
      await deleteDoc(doc(db, 'quizzes', id));
      toast('Kviz obrisan', 'success');
      await loadAll();
    };

    window.openPreview = (id) => {
      sessionStorage.setItem('previewQuizId', id);
      window.location.href = '/result?mode=quiz-preview&id=' + id;
    };

    window.openResult = (id) => {
      sessionStorage.setItem('resultId', id);
      window.location.href = '/result?id=' + id;
    };
  </script>
</body>
</html>
